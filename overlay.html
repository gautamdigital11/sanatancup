<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Live Auction Overlay - Gautam Digital</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; font-family: 'Segoe UI', sans-serif; width: 1920px; height: 1080px; }

        /* --- WATERMARKS --- */
        .global-watermark { position: absolute; background-repeat: no-repeat; background-position: center; background-size: contain; pointer-events: none; z-index: 1; }
        .box-watermark { position: absolute; right: 10px; bottom: 10px; width: 250px; height: 100px; opacity: 0.08; z-index: -1; }

        /* --- PLAYER BOX (LOWER THIRD) --- */
        .overlay-container {
            position: absolute; bottom: 100px; left: 80px;
            display: flex; align-items: center;
            background: linear-gradient(90deg, rgba(0,0,0,0.95) 0%, rgba(35,35,35,0.9) 100%);
            border-bottom: 5px solid #6fffe9; border-radius: 15px;
            padding: 10px 40px 10px 160px; width: 700px; height: 120px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); z-index: 10;
        }
        .p-photo-wrapper {
            position: absolute; left: -20px; top: -40px; width: 160px; height: 200px;
            border-radius: 20px; border: 5px solid #6fffe9; overflow: hidden; background: #222;
            box-shadow: 0 10px 25px rgba(111,255,233,0.4); z-index: 15;
        }
        .p-photo { width: 100%; height: 100%; object-fit: cover; }
        .p-info h2 { margin: 0; color: #6fffe9; font-size: 45px; text-transform: uppercase; }
        .p-info p { margin: 10px 0 0; color: #ffffff; font-size: 24px; font-weight: bold; }

        /* --- CELEBRATION SCREEN (SOLD/UNSOLD) --- */
        #celebrationScreen {
            position: fixed; top: 0; left: 0; width: 1920px; height: 1080px;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 99999; animation: fadeIn 0.5s;
        }
        .status-header { font-size: 200px; font-weight: 900; margin: 0; text-shadow: 0 0 50px rgba(0,0,0,0.5); animation: zoomIn 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        .sold-bg { background: rgba(0, 0, 0, 0.95); }
        .unsold-bg { background: rgba(50, 50, 50, 0.95); }
        
        .celeb-photo { width: 400px; height: 400px; border-radius: 30px; border: 10px solid white; margin: 20px 0; object-fit: cover; }
        .celeb-msg { font-size: 60px; color: white; font-weight: bold; text-align: center; text-transform: uppercase; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* TICKER */
        .ticker-wrap { position: fixed; bottom: 0; width: 100%; height: 60px; background: #ff0054; color: white; display: flex; align-items: center; z-index: 5; font-size: 24px; font-weight: bold; overflow: hidden; }
        .ticker-content { white-space: nowrap; animation: ticker 60s linear infinite; padding-left: 100%; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div id="celebrationScreen">
        <p id="statusText" class="status-header"></p>
        <img id="celebPhoto" class="celeb-photo" src="">
        <div id="celebMsg" class="celeb-msg"></div>
    </div>

    <div class="overlay-container" id="playerBox">
        <div class="p-photo-wrapper">
            <img id="overPhoto" class="p-photo" src="">
        </div>
        <div class="p-info">
            <h2 id="overName">WAITING...</h2>
            <p id="overType">GAUTAM DIGITAL LIVE</p>
        </div>
    </div>

    <div class="ticker-wrap">
        <div id="tickerItems" class="ticker-content">Syncing Auction Data...</div>
    </div>

<script>
    const mainAPI = "https://script.google.com/macros/s/AKfycbx4OBlVp-XgSXJdt4S04PAJII4bJhxYnCU6_9O3QFdr75_0XnYmw4JG3XDQbE0S32jQ1w/exec";
    
    let lastProcessedPlayer = ""; // प्लेयर का नाम
    let lastProcessedStatus = ""; // प्लेयर का पिछला स्टेटस
    let isAnimating = false;

    function getPhoto(link) {
        if (!link || link === "NONE") return "https://via.placeholder.com/160?text=HPL";
        let id = link.includes("id=") ? link.split("id=")[1].split("&")[0] : link.split("/d/")[1]?.split("/")[0];
        return id ? "https://lh3.googleusercontent.com/d/" + id : link;
    }

    async function updateData() {
        if (isAnimating) return;

        try {
            const t = new Date().getTime();
            const response = await fetch(mainAPI + "?action=players&t=" + t);
            const players = await response.json();
            
            // 1. Current Bidding Player (Status: Empty or AVAILABLE)
            const currentPlayer = players.find(p => !p.status || p.status === "AVAILABLE" || p.status === "BIDDING");
            
            if (currentPlayer) {
                document.getElementById("overName").innerText = currentPlayer.name.toUpperCase();
                document.getElementById("overType").innerText = `${currentPlayer.type} | ${currentPlayer.address || 'SEONI'}`;
                document.getElementById("overPhoto").src = getPhoto(currentPlayer.photo);
            }

            // 2. Logic for Animation (Check ALL players for a new SOLD/UNSOLD status)
            // हम लिस्ट के अंत से चेक करते हैं ताकि सबसे नया एक्शन पकड़ा जाए
            for (let i = players.length - 1; i >= 0; i--) {
                const p = players[i];
                const playerID = p.name + p.type;
                const currentStatus = p.status ? p.status.toUpperCase() : "";

                // अगर स्टेटस SOLD या UNSOLD है और यह पिछली बार से अलग है
                if ((currentStatus === "SOLD" || currentStatus === "UNSOLD") && 
                    (lastProcessedPlayer !== playerID || lastProcessedStatus !== currentStatus)) {
                    
                    lastProcessedPlayer = playerID;
                    lastProcessedStatus = currentStatus;
                    triggerAnimation(p, currentStatus);
                    break; // एक बार में एक ही एनीमेशन
                }
            }

        } catch (e) { console.error("Data Sync Error"); }
    }

    function triggerAnimation(player, status) {
        isAnimating = true;
        const screen = document.getElementById("celebrationScreen");
        const statusText = document.getElementById("statusText");
        const celebPhoto = document.getElementById("celebPhoto");
        const celebMsg = document.getElementById("celebMsg");

        celebPhoto.src = getPhoto(player.photo);
        
        if (status === "SOLD") {
            screen.className = "sold-bg";
            statusText.innerText = "SOLD";
            statusText.style.color = "#ff0054";
            celebMsg.innerHTML = `${player.name}<br><span style="color:#6fffe9">${player.team}</span><br>₹${parseInt(player.price).toLocaleString('en-IN')}`;
            
            confetti({ particleCount: 500, spread: 100, origin: { y: 0.6 }, colors: ['#ff0054', '#6fffe9', '#ffffff'] });
        } else {
            screen.className = "unsold-bg";
            statusText.innerText = "UNSOLD";
            statusText.style.color = "#ffffff";
            celebMsg.innerHTML = `${player.name}<br><span style="color:#aaaaaa">BETTER LUCK NEXT TIME</span>`;
        }

        screen.style.display = "flex";

        // 7 सेकंड बाद एनीमेशन हटा दें
        setTimeout(() => {
            screen.style.display = "none";
            isAnimating = false;
        }, 7000);
    }

    setInterval(updateData, 3000);
    updateData();
</script>
</body>
</html>
