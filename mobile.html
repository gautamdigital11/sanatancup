<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPL 2026 - Live Auction Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0b132b; --accent: #00a8ff; --gold: #f1c40f; --success: #2ecc71; }
        body { font-family: 'Roboto', sans-serif; background: #0b132b; color: white; margin: 0; padding: 10px; }
        
        .header { text-align: center; padding: 15px 0; border-bottom: 2px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
        .header h1 { margin: 0; font-size: 22px; color: var(--accent); letter-spacing: 1px; }
        .header p { margin: 5px 0 0; font-size: 12px; opacity: 0.7; }

        /* Current Player Card */
        .live-card {
            background: linear-gradient(145deg, #1c2541, #0b132b);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 2px solid var(--accent);
            box-shadow: 0 10px 30px rgba(0,168,255,0.2);
            margin-bottom: 25px;
        }
        .live-label { background: #ff4757; color: white; padding: 4px 12px; border-radius: 50px; font-size: 10px; font-weight: bold; text-transform: uppercase; animation: blink 1.2s infinite; }
        #currPhoto { width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--accent); margin: 15px 0; object-fit: cover; background: #1c2541; }
        #currName { font-size: 24px; margin: 5px 0; color: var(--gold); text-transform: uppercase; }
        #currType { font-size: 14px; opacity: 0.9; margin-bottom: 10px; }

        /* Teams Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .team-row {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--accent);
        }
        .team-info b { font-size: 16px; display: block; margin-bottom: 4px; }
        .team-info span { font-size: 11px; opacity: 0.6; }
        
        .team-values { text-align: right; }
        .val-balance { color: var(--success); font-weight: 900; font-size: 18px; display: block; }
        .val-max { color: var(--gold); font-size: 12px; font-weight: bold; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .refresh-msg { text-align: center; font-size: 10px; margin-top: 20px; opacity: 0.4; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🏏 UPL 2026 LIVE</h1>
        <p>GAUTAM DIGITAL REAL-TIME UPDATES</p>
    </div>

    <div class="live-card">
        <span class="live-label">In Auction Now</span><br>
        <img id="currPhoto" src="https://via.placeholder.com/140" alt="Player">
        <h2 id="currName">Loding...</h2>
        <div id="currType">Connecting to Server...</div>
    </div>

    <h3 style="font-size: 16px; margin: 20px 0 10px 5px; border-left: 3px solid var(--gold); padding-left: 10px;">TEAM STANDINGS</h3>
    <div id="statsList" class="stats-grid">
        </div>

    <p class="refresh-msg">Data updates automatically every 5 seconds</p>

    <script>
        const apiURL = "https://script.google.com/macros/s/AKfycbx4OBlVp-XgSXJdt4S04PAJII4bJhxYnCU6_9O3QFdr75_0XnYmw4JG3XDQbE0S32jQ1w/exec";

        async function updateLive() {
            try {
                const t = new Date().getTime();
                const [pRes, tRes] = await Promise.all([
                    fetch(apiURL + "?action=players&t=" + t).then(r => r.json()),
                    fetch(apiURL + "?action=teams&t=" + t).then(r => r.json())
                ]);

                // 1. Current Player Logic
                const available = pRes.filter(p => !p.team || p.team === "" || p.status === "AVAILABLE");
                if (available.length > 0) {
                    const p = available[0];
                    document.getElementById("currName").innerText = p.name;
                    document.getElementById("currType").innerText = `${p.type} | ${p.address || 'Seoni'}`;
                    document.getElementById("currPhoto").src = getPhoto(p.photo);
                } else {
                    document.getElementById("currName").innerText = "AUCTION OVER";
                    document.getElementById("currType").innerText = "All players sold!";
                }

                // 2. Teams Stats Logic
                const statsContainer = document.getElementById("statsList");
                statsContainer.innerHTML = "";

                tRes.forEach(t => {
                    const squad = pRes.filter(p => p.team && p.team.trim() === t.name.trim() && p.status === "SOLD");
                    const spent = squad.reduce((sum, p) => sum + (parseFloat(p.price) || 0), 0);
                    const balance = (parseFloat(t.purse) || 50000) - spent;
                    
                    // Max Bid Rule (13 players)
                    let maxBid = (squad.length < 13) ? (balance - ((13 - squad.length - 1) * 1000)) : balance;

                    statsContainer.innerHTML += `
                        <div class="team-row">
                            <div class="team-info">
                                <b>${t.name}</b>
                                <span>Squad: ${squad.length}/13</span>
                            </div>
                            <div class="team-values">
                                <span class="val-balance">₹${balance.toLocaleString()}</span>
                                <span class="val-max">Max: ₹${(maxBid < 0 ? 0 : maxBid).toLocaleString()}</span>
                            </div>
                        </div>
                    `;
                });

            } catch (e) { console.log("Sync Error"); }
        }

        function getPhoto(link) {
            if (!link) return "https://via.placeholder.com/140";
            let id = link.includes("id=") ? link.split("id=")[1].split("&")[0] : link.includes("/d/") ? link.split("/d/")[1].split("/")[0] : "";
            return id ? "https://lh3.googleusercontent.com/d/" + id : link;
        }

        // Auto Refresh
        setInterval(updateLive, 5000);
        updateLive();
    </script>
</body>
</html>
