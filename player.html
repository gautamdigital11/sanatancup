<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAYER LIST</title>
    <style>
        :root { 
            --primary: #0b132b; 
            --accent: #00a8ff; 
            --success: #27ae60; 
            --danger: #ef4444; 
            --warning: #f59e0b; 
            --bg: #f4f7f6; 
        }
        
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }

        .header { text-align: center; border-bottom: 3px solid var(--primary); padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { margin: 0; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }

        .controls { display: flex; justify-content: center; margin-bottom: 30px; gap: 15px; }
        #playerSearch { 
            padding: 12px 25px; width: 350px; border-radius: 50px; 
            border: 2px solid #ddd; font-size: 16px; outline: none; 
        }

        /* Status Badge Styles */
        .status-badge { 
            padding: 5px 15px; border-radius: 50px; font-size: 11px; 
            font-weight: bold; text-transform: uppercase; color: white; 
            display: inline-block; margin: 10px 0;
        }
        .bg-sold { background: var(--success); }
        .bg-unsold { background: var(--danger); }
        .bg-available { background: #94a3b8; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .player-card { 
            background: white; border-radius: 15px; padding: 20px; text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; position: relative; 
            transition: 0.3s;
        }
        .player-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        
        .sno-badge { position: absolute; top: 15px; left: 15px; background: #f1f5f9; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; color: var(--primary); }

        .photo-frame { width: 110px; height: 110px; border-radius: 50%; padding: 4px; background: linear-gradient(135deg, var(--accent), var(--primary)); margin: 0 auto 10px; overflow: hidden; }
        .player-photo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #fff; }
        
        .p-name { font-size: 18px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin: 5px 0; }
        .p-type { font-size: 11px; color: #64748b; font-weight: bold; text-transform: uppercase; }
        
        .sold-info { background: #f0fdf4; border: 1px dashed var(--success); padding: 8px; border-radius: 8px; margin-top: 10px; font-size: 13px; }
        .sold-info b { color: var(--success); font-size: 15px; display: block; }

        .contact-info { background: #f8fafc; border: 1px solid #e2e8f0; padding: 10px; border-radius: 10px; font-size: 13px; margin-top: 10px; }
        .contact-info b { display: block; color: var(--primary); font-size: 14px; }

        .print-btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; float: right; }
        @media print { .print-btn, .controls { display: none; } }
    </style>
</head>
<body>

    <div class="container">
        <button class="print-btn" onclick="window.print()">🖨️ Export PDF</button>
        <div class="header">
            <h1>PLAYER GALLERY</h1>
        </div>

        <div class="controls">
            <input type="text" id="playerSearch" placeholder="Search player name..." onkeyup="filterCards()">
        </div>

        <div id="galleryGrid" class="gallery-grid">
            <p style="text-align:center; width:100%;">Fetching Live Status...</p>
        </div>
    </div>

<script>
    const baseAPI = "https://script.google.com/macros/s/AKfycbx4OBlVp-XgSXJdt4S04PAJII4bJhxYnCU6_9O3QFdr75_0XnYmw4JG3XDQbE0S32jQ1w/exec";

    function getPhoto(link) {
        if (!link || link.trim() === "" || link === "NONE") return "https://via.placeholder.com/120?text=No+Photo";
        let id = "";
        if (link.includes("id=")) {
            id = link.split("id=")[1].split("&")[0];
        } else if (link.includes("/d/")) {
            id = link.split("/d/")[1].split("/")[0];
        }
        return id ? "https://lh3.googleusercontent.com/d/" + id : link;
    }

    async function loadGallery() {
        try {
            const t = new Date().getTime();
            // Hum action=players call karenge kyunki hamara Apps Script wahi se SOLD status bhi bhej raha hai
            const response = await fetch(baseAPI + "?action=players&t=" + t);
            const players = await response.json();
            
            const grid = document.getElementById("galleryGrid");
            grid.innerHTML = "";

            players.forEach((p, i) => {
                // Status mapping
                let statusClass = "bg-available";
                let statusText = "AVAILABLE";
                
                if (p.status === "SOLD") {
                    statusClass = "bg-sold";
                    statusText = "SOLD";
                } else if (p.status === "UNSOLD") {
                    statusClass = "bg-unsold";
                    statusText = "UNSOLD";
                }

                const card = document.createElement("div");
                card.className = "player-card";
                
                // Sold details agar player bik chuka hai
                let soldDetails = "";
                if (p.status === "SOLD") {
                    soldDetails = `
                        <div class="sold-info">
                            Team: <b>${p.team}</b>
                            Price: <b>₹${parseInt(p.price).toLocaleString()}</b>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="sno-badge">ID: GDA-${i + 1}</div>
                    <div class="photo-frame">
                        <img class="player-photo" src="${getPhoto(p.photo)}" onerror="this.src='https://via.placeholder.com/120?text=Error'">
                    </div>
                    <div class="p-name">${p.name}</div>
                    <div class="p-type">${p.type}</div>
                    
                    <div class="status-badge ${statusClass}">${statusText}</div>

                    ${soldDetails}

                    <div class="contact-info">
                        📞 <b>${p.mobile || 'Private'}</b>
                        <small style="display:block; color:#64748b; margin-top:5px;">📍 ${p.address || 'Seoni'}</small>
                    </div>
                `;
                grid.appendChild(card);
            });
        } catch (e) { 
            console.error(e); 
            document.getElementById("galleryGrid").innerHTML = "<p style='color:red; text-align:center;'>Unable to sync data. Check Internet or API.</p>";
        }
    }

    function filterCards() {
        let input = document.getElementById('playerSearch').value.toLowerCase();
        let cards = document.getElementsByClassName('player-card');
        for (let i = 0; i < cards.length; i++) {
            let name = cards[i].querySelector('.p-name').innerText.toLowerCase();
            cards[i].style.display = name.includes(input) ? "block" : "none";
        }
    }

    loadGallery();
    // Har 30 second me gallery automatic update hogi
    setInterval(loadGallery, 30000);
</script>
</body>
</html>
