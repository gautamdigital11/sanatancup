<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>GDA - Official Records & Reports</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 3px solid #0b132b; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #0b132b; text-transform: uppercase; letter-spacing: 1px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #0b132b; color: white; padding: 12px; text-align: left; text-transform: uppercase; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 15px; }
        tr:nth-child(even) { background: #f9f9f9; }
        
        .p-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; vertical-align: middle; margin-right: 12px; border: 2px solid #ddd; }
        .price-tag { font-weight: bold; color: #27ae60; }
        .team-tag { background: #ff0054; color: white; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .mobile-no { font-family: 'Courier New', monospace; font-weight: bold; color: #2c3e50; font-size: 16px; }
        
        .print-btn { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; float: right; }
        @media print { .print-btn { display: none; } .container { box-shadow: none; padding: 0; } }
    </style>
</head>
<body>

    <div class="container">
        <button class="print-btn" onclick="window.print()">🖨️ Print List</button>
        <div class="header">
            <h1 id="listTitle">Loading List...</h1>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 50px;">S.No</th>
                    <th>Player Name</th>
                    <th>Category</th>
                    <th>Status / Team</th>
                    <th>Price</th>
                    <th>Mobile Number</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="6" style="text-align:center; padding:50px;">Syncing data from Master API...</td></tr>
            </tbody>
        </table>
    </div>

<script>
    // --- SINGLE MASTER API LINK ---
        const mainAPI = "https://script.google.com/macros/s/AKfycbx4OBlVp-XgSXJdt4S04PAJII4bJhxYnCU6_9O3QFdr75_0XnYmw4JG3XDQbE0S32jQ1w/exec";

    function getPhoto(link) {
        if (!link || link === "NONE") return "https://via.placeholder.com/45?text=HPL";
        let id = (link.includes("id=")) ? link.split("id=")[1].split("&")[0] : (link.includes("/d/")) ? link.split("/d/")[1].split("/")[0] : "";
        return id ? "https://lh3.googleusercontent.com/d/" + id : link;
    }

    async function renderList() {
        try {
            const urlParams = new URLSearchParams(window.location.search);
            const type = urlParams.get('type');
            const teamName = urlParams.get('name');

            // Ek hi API se data fetch karein
            const response = await fetch(mainAPI + "?action=players&t=" + Date.now());
            const players = await response.json();

            let finalData = [];
            let title = "PLAYER Report";

            // Filtering logic using the consolidated 'status' and 'team' from mainAPI
            if (type === 'TOTAL') {
                title = "All Registered Players";
                finalData = players; 
            } else if (type === 'SOLD_ALL') {
                title = "All Sold Players";
                finalData = players.filter(p => p.status === "SOLD");
            } else if (type === 'UNSOLD') {
                title = "Unsold Players List";
                finalData = players.filter(p => p.status === "UNSOLD");
            } else if (type === 'PENDING') {
                title = "Available Players (Pending)";
                finalData = players.filter(p => !p.status || p.status === "AVAILABLE" || p.status === "");
            } else if (type === 'TEAM' && teamName) {
                title = teamName.toUpperCase() + " Squad";
                finalData = players.filter(p => p.team && p.team.trim() === teamName.trim() && p.status === "SOLD");
            }

            document.getElementById("listTitle").innerText = title;
            const tbody = document.getElementById("tableBody");
            
            if (finalData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:50px; color:#999;">No records found for this category.</td></tr>';
                return;
            }

            tbody.innerHTML = finalData.map((p, i) => {
                const contact = p.mobile || "Private";
                const priceLabel = (p.status === "SOLD") ? "₹" + parseInt(p.price).toLocaleString() : "-";
                const teamInfo = p.team || p.status || "Registered";
                
                // Styling for different statuses
                const badgeClass = (p.status === "SOLD") ? "team-tag" : "";

                return `
                <tr>
                    <td>${i + 1}</td>
                    <td>
                        <img src="${getPhoto(p.photo)}" class="p-img" onerror="this.src='https://via.placeholder.com/45'"> 
                        <b>${p.name.toUpperCase()}</b>
                    </td>
                    <td>${p.type || '-'}</td>
                    <td><span class="${badgeClass}">${teamInfo}</span></td>
                    <td class="price-tag">${priceLabel}</td>
                    <td class="mobile-no">${contact}</td>
                </tr>
                `;
            }).join('');

        } catch (error) {
            console.error("Error loading report:", error);
            document.getElementById("listTitle").innerText = "Connection Error";
            document.getElementById("tableBody").innerHTML = '<tr><td colspan="6" style="text-align:center; color:red; padding:50px;">API could not be reached. Check internet or deployment.</td></tr>';
        }
    }
    
    renderList();
</script>
</body>
</html>
