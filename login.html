<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>UPL Login</title>
    <style>
        body { background: #0b132b; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { background: #1c2541; padding: 40px; border-radius: 20px; border: 2px solid #6fffe9; text-align: center; box-shadow: 0 0 30px rgba(111,255,233,0.3); }
        input { padding: 15px; width: 250px; border-radius: 10px; border: none; margin-bottom: 20px; font-size: 18px; text-align: center; }
        button { background: #6fffe9; color: #0b132b; padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔒  GAUTAM DIGITAL</h2>
        <input type="password" id="pass" placeholder="Password">
        <button onclick="check()">LOGIN</button>
    </div>
    <script>
        function check() {
            if (document.getElementById("pass").value === "2580") { 
                sessionStorage.setItem("hpl_auth", "true");
                window.location.href = "index.html"; 
            } else { alert("Wrong!"); }
        }
    </script>
</body>
</html>
