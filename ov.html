<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,"> <title>Gautam Digital Live</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; font-family: 'Segoe UI', sans-serif; width: 1920px; height: 1080px; }

        /* --- SOLD/UNSOLD SCREEN --- */
        #celebScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 99999; background: rgba(0,0,0,0.95);
        }
        .status-txt { font-size: 200px; font-weight: 900; margin: 0; text-transform: uppercase; }
        .celeb-img { width: 400px; height: 400px; border-radius: 50%; border: 15px solid white; margin: 20px; object-fit: cover; }
        .celeb-info { font-size: 70px; color: white; text-align: center; font-weight: bold; }

        /* --- LOWER THIRD --- */
        .player-box {
            position: absolute; bottom: 80px; left: 60px;
            display: flex; align-items: center; background: rgba(0,0,0,0.9);
            padding: 15px 40px 15px 150px; width: 600px; height: 100px;
            border-radius: 0 20px 20px 0; border-left: 10px solid #6fffe9;
        }
        .p-img-wrap { position: absolute; left: -20px; top: -20px; width: 140px; height: 140px; border: 5px solid #6fffe9; border-radius: 10px; overflow: hidden; background: #222; }
        .p-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .p-name { color: #6fffe9; font-size: 40px; margin: 0; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="celebScreen">
        <h1 id="statusTitle" class="status-txt"></h1>
        <img id="celebImg" class="celeb-img" src="">
        <div id="celebDetail" class="celeb-info"></div>
    </div>

    <div class="player-box">
        <div class="p-img-wrap"><img id="mainImg" src=""></div>
        <div class="p-info">
            <h2 id="mainName">WAITING...</h2>
            <p id="mainType" style="color:white; margin:0; opacity:0.8;">GAUTAM DIGITAL</p>
        </div>
    </div>

<script>
    const apiURL = "https://script.google.com/macros/s/AKfycbx4OBlVp-XgSXJdt4S04PAJII4bJhxYnCU6_9O3QFdr75_0XnYmw4JG3XDQbE0S32jQ1w/exec";
    
    let currentShownPlayer = ""; // Track current player on screen
    let lastActionID = ""; // Track last SOLD/UNSOLD action
    let isAnimating = false;

    function getImg(link) {
        if (!link || link === "NONE") return "https://via.placeholder.com/200";
        let id = link.includes("id=") ? link.split("id=")[1].split("&")[0] : link.split("/d/")[1]?.split("/")[0];
        return id ? "https://lh3.googleusercontent.com/d/" + id : link;
    }

    async function sync() {
        if (isAnimating) return;

        try {
            const res = await fetch(apiURL + "?action=players&t=" + Date.now());
            const data = await res.json();
            
            // 1. Check for Latest SOLD/UNSOLD (Looking from end of sheet)
            let latestAction = null;
            for(let i = data.length - 1; i >= 0; i--) {
                let s = data[i].status ? data[i].status.toUpperCase().trim() : "";
                if (s === "SOLD" || s === "UNSOLD") {
                    latestAction = data[i];
                    break;
                }
            }

            if (latestAction) {
                let actionKey = latestAction.name + latestAction.status + (latestAction.price || "");
                
                // If this is a NEW action that we haven't shown yet
                if (lastActionID !== "" && lastActionID !== actionKey) {
                    lastActionID = actionKey;
                    runAnimation(latestAction);
                    return; // Stop here, animation takes priority
                }
                lastActionID = actionKey; // Update key without animation on first load
            }

            // 2. Update Current Player (Only if not animating)
            const active = data.find(p => !p.status || p.status.toUpperCase() === "AVAILABLE" || p.status.toUpperCase() === "BIDDING");
            if (active && active.name !== currentShownPlayer) {
                currentShownPlayer = active.name;
                document.getElementById("mainName").innerText = active.name.toUpperCase();
                document.getElementById("mainImg").src = getImg(active.photo);
                document.getElementById("mainType").innerText = active.type + " | " + (active.address || "HPL");
            }

        } catch (e) { console.error("API Error"); }
    }

    function runAnimation(p) {
        isAnimating = true;
        const screen = document.getElementById("celebScreen");
        const title = document.getElementById("statusTitle");
        const info = document.getElementById("celebDetail");
        const img = document.getElementById("celebImg");

        let s = p.status.toUpperCase();
        img.src = getImg(p.photo);
        title.innerText = s;
        title.style.color = (s === "SOLD") ? "#ff0054" : "#ffffff";
        
        if (s === "SOLD") {
            info.innerHTML = `${p.name}<br><span style="color:#6fffe9">${p.team}</span><br><span style="color:#ffcc00">₹${parseInt(p.price).toLocaleString('en-IN')}</span>`;
            confetti({ particleCount: 500, spread: 120, origin: { y: 0.6 } });
        } else {
            info.innerHTML = `${p.name}<br><span style="color:#aaa">UNSOLD</span>`;
        }

        screen.style.display = "flex";
        setTimeout(() => {
            screen.style.display = "none";
            isAnimating = false;
        }, 8000);
    }

    setInterval(sync, 3000);
    sync();
</script>
</body>
</html>
