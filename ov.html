<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gautam Digital - Live Auction</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; font-family: 'Segoe UI', sans-serif; width: 1920px; height: 1080px; }
        
        /* SOLD/UNSOLD SCREEN */
        #celebScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; background: rgba(0,0,0,0.98);
        }
        .status-txt { font-size: 250px; font-weight: 900; margin: 0; text-transform: uppercase; line-height: 1; }
        .celeb-img { width: 450px; height: 450px; border-radius: 50%; border: 15px solid white; margin: 20px; object-fit: cover; }
        .celeb-info { font-size: 80px; color: white; text-align: center; font-weight: bold; }

        /* LOWER THIRD */
        .player-box {
            position: absolute; bottom: 80px; left: 60px;
            display: flex; align-items: center; background: rgba(0,0,0,0.9);
            padding: 15px 40px 15px 150px; width: 650px; height: 110px;
            border-radius: 0 20px 20px 0; border-left: 10px solid #6fffe9;
        }
        .img-wrap { position: absolute; left: -20px; top: -30px; width: 150px; height: 170px; border: 5px solid #6fffe9; border-radius: 15px; overflow: hidden; background: #222; }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .p-name { color: #6fffe9; font-size: 45px; margin: 0; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="celebScreen">
        <h1 id="statusTitle" class="status-txt"></h1>
        <img id="celebImg" class="celeb-img" src="">
        <div id="celebDetail" class="celeb-info"></div>
    </div>

    <div class="player-box">
        <div class="img-wrap"><img id="mainImg" src=""></div>
        <div class="p-info">
            <h2 id="mainName" class="p-name">WAITING...</h2>
            <p id="mainType" style="color:white; margin:5px 0 0; font-size:24px;">GAUTAM DIGITAL LIVE</p>
        </div>
    </div>

<script>
    const apiURL = "https://script.google.com/macros/s/AKfycbx4OBlVp-XgSXJdt4S04PAJII4bJhxYnCU6_9O3QFdr75_0XnYmw4JG3XDQbE0S32jQ1w/exec";
    
    let lastActionID = ""; 
    let isAnimating = false;

    function getImg(link) {
        if (!link || link === "NONE") return "https://via.placeholder.com/300?text=IMAGE";
        let id = link.includes("id=") ? link.split("id=")[1].split("&")[0] : link.split("/d/")[1]?.split("/")[0];
        return id ? "https://lh3.googleusercontent.com/d/" + id : link;
    }

    async function sync() {
        if (isAnimating) return;

        try {
            const res = await fetch(apiURL + "?action=players&t=" + Date.now());
            const data = await res.json();
            
            // 1. Check for Latest SOLD/UNSOLD
            let latest = null;
            for(let i = data.length - 1; i >= 0; i--) {
                let s = data[i].status ? data[i].status.toString().toUpperCase().trim() : "";
                if (s === "SOLD" || s === "UNSOLD") {
                    latest = data[i];
                    break;
                }
            }

            if (latest) {
                let statusClean = latest.status.toString().toUpperCase().trim();
                let actionKey = latest.name + statusClean + (latest.price || "");

                // Logic: Agar data naya hai aur lastActionID set hai (Initial load pe nahi chalega)
                if (lastActionID !== "" && lastActionID !== actionKey) {
                    lastActionID = actionKey;
                    triggerCelebration(latest, statusClean);
                    return;
                }
                lastActionID = actionKey;
            }

            // 2. Update Current Player
            const active = data.find(p => !p.status || p.status.toString().toUpperCase().trim() === "AVAILABLE" || p.status.toString().toUpperCase().trim() === "BIDDING");
            if (active) {
                document.getElementById("mainName").innerText = active.name.toUpperCase();
                document.getElementById("mainImg").src = getImg(active.photo);
                document.getElementById("mainType").innerText = `${active.type} | ${active.address || 'HPL'}`;
            }

        } catch (e) { console.error("API Error"); }
    }

    function triggerCelebration(p, status) {
        isAnimating = true;
        const screen = document.getElementById("celebScreen");
        document.getElementById("celebImg").src = getImg(p.photo);
        document.getElementById("statusTitle").innerText = status;
        document.getElementById("statusTitle").style.color = (status === "SOLD") ? "#ff0054" : "#ffffff";
        
        if (status === "SOLD") {
            document.getElementById("celebDetail").innerHTML = `${p.name}<br><span style="color:#6fffe9">${p.team}</span><br><span style="color:#ffcc00">₹${parseInt(p.price || 0).toLocaleString('en-IN')}</span>`;
            confetti({ particleCount: 600, spread: 150, origin: { y: 0.6 }, zIndex: 10000 });
        } else {
            document.getElementById("celebDetail").innerHTML = `${p.name}<br><span style="color:#aaa">UNSOLD</span>`;
        }

        screen.style.display = "flex";
        setTimeout(() => {
            screen.style.display = "none";
            isAnimating = false;
        }, 8000);
    }

    setInterval(sync, 3000);
    sync();
</script>
</body>
</html>
