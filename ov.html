<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <title>Gautam Digital - Final Fixed Overlay</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; font-family: 'Segoe UI', sans-serif; width: 1920px; height: 1080px; }

        /* --- CELEBRATION SCREEN (SOLD/UNSOLD) --- */
        #celebScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 99999; background: rgba(0,0,0,0.96);
        }
        .status-txt { font-size: 220px; font-weight: 900; margin: 0; text-transform: uppercase; animation: zoomIn 0.5s; }
        .celeb-img { width: 420px; height: 420px; border-radius: 50%; border: 15px solid #6fffe9; margin: 20px; object-fit: cover; box-shadow: 0 0 60px rgba(111,255,233,0.4); }
        .celeb-info { font-size: 75px; color: white; text-align: center; font-weight: bold; line-height: 1.1; }

        /* --- LOWER THIRD --- */
        .player-box {
            position: absolute; bottom: 80px; left: 60px;
            display: flex; align-items: center; background: rgba(0,0,0,0.9);
            padding: 15px 40px 15px 150px; width: 620px; height: 110px;
            border-radius: 0 20px 20px 0; border-left: 12px solid #6fffe9;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
        }
        .p-img-wrap { position: absolute; left: -20px; top: -35px; width: 150px; height: 170px; border: 5px solid #6fffe9; border-radius: 15px; overflow: hidden; background: #222; }
        .p-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .p-name { color: #6fffe9; font-size: 45px; margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        @keyframes zoomIn { 0% { transform: scale(0.3); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div id="celebScreen">
        <h1 id="statusTitle" class="status-txt"></h1>
        <img id="celebImg" class="celeb-img" src="">
        <div id="celebDetail" class="celeb-info"></div>
    </div>

    <div class="player-box">
        <div class="p-img-wrap"><img id="mainImg" src=""></div>
        <div class="p-info">
            <h2 id="mainName" class="p-name">WAITING...</h2>
            <p id="mainType" style="color:white; margin:8px 0 0; font-size:24px; font-weight:bold; opacity:0.8;">GAUTAM DIGITAL LIVE</p>
        </div>
    </div>

<script>
    const apiURL = "https://script.google.com/macros/s/AKfycbx4OBlVp-XgSXJdt4S04PAJII4bJhxYnCU6_9O3QFdr75_0XnYmw4JG3XDQbE0S32jQ1w/exec";
    
    let lastProcessedKey = ""; 
    let isAnimating = false;

    function getImg(link) {
        if (!link || link === "NONE" || link === "") return "https://via.placeholder.com/300?text=IMAGE";
        let id = link.includes("id=") ? link.split("id=")[1].split("&")[0] : link.split("/d/")[1]?.split("/")[0];
        return id ? "https://lh3.googleusercontent.com/d/" + id : link;
    }

    async function syncData() {
        if (isAnimating) return;

        try {
            const t = Date.now();
            const response = await fetch(apiURL + "?action=players&t=" + t);
            const data = await response.json();
            
            // 1. SOLD/UNSOLD ढूंढने का सबसे पक्का तरीका
            let latestAction = null;
            for(let i = data.length - 1; i >= 0; i--) {
                let s = data[i].status ? data[i].status.toString().toUpperCase().trim() : "";
                if (s === "SOLD" || s === "UNSOLD") {
                    latestAction = data[i];
                    break; 
                }
            }

            if (latestAction) {
                let statusClean = latestAction.status.toString().toUpperCase().trim();
                let actionKey = latestAction.name + statusClean + (latestAction.price || "");
                
                // अगर नया सोल्ड/अनसोल्ड मिला
                if (lastProcessedKey !== "" && lastProcessedKey !== actionKey) {
                    lastProcessedKey = actionKey;
                    startAnimation(latestAction, statusClean);
                    return; 
                }
                lastProcessedKey = actionKey; 
            }

            // 2. Current Bidding Player Update
            const active = data.find(p => !p.status || p.status.toString().toUpperCase().trim() === "AVAILABLE" || p.status.toString().toUpperCase().trim() === "BIDDING");
            if (active) {
                document.getElementById("mainName").innerText = active.name.toUpperCase();
                document.getElementById("mainImg").src = getImg(active.photo);
                document.getElementById("mainType").innerText = `${active.type} | ${active.address || 'HPL SEONI'}`;
            }

        } catch (e) { console.log("Check API/Internet Connection"); }
    }

    function startAnimation(p, status) {
        isAnimating = true;
        const screen = document.getElementById("celebScreen");
        const title = document.getElementById("statusTitle");
        const info = document.getElementById("celebDetail");
        const img = document.getElementById("celebImg");

        img.src = getImg(p.photo);
        title.innerText = status;
        
        if (status === "SOLD") {
            title.style.color = "#ff0054"; // Red for Sold
            info.innerHTML = `<span style="font-size:85px;">${p.name}</span><br><span style="color:#6fffe9">${p.team}</span><br><span style="color:#ffcc00">₹${parseInt(p.price || 0).toLocaleString('en-IN')}</span>`;
            
            // पटाखा (Confetti)
            confetti({ particleCount: 600, spread: 150, origin: { y: 0.6 }, zIndex: 100000 });
        } else {
            title.style.color = "#ffffff"; // White for Unsold
            info.innerHTML = `<span style="font-size:85px;">${p.name}</span><br><span style="color:#aaaaaa">BETTER LUCK NEXT TIME</span>`;
        }

        screen.style.display = "flex";

        // 8 सेकंड तक एनीमेशन दिखाएं
        setTimeout(() => {
            screen.style.display = "none";
            isAnimating = false;
        }, 8000);
    }

    setInterval(syncData, 3000);
    syncData();
</script>
</body>
</html>
