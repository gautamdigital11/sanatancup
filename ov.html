<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <title>Gautam Digital - Fixed Overlay</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; font-family: 'Segoe UI', sans-serif; width: 1920px; height: 1080px; }

        /* --- SOLD/UNSOLD SCREEN --- */
        #celebScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 99999; background: rgba(0,0,0,0.98);
        }
        .status-txt { font-size: 220px; font-weight: 900; margin: 0; text-transform: uppercase; line-height: 1; }
        .celeb-img { width: 420px; height: 420px; border-radius: 50%; border: 15px solid #6fffe9; margin: 20px; object-fit: cover; box-shadow: 0 0 60px rgba(111,255,233,0.5); }
        .celeb-info { font-size: 75px; color: white; text-align: center; font-weight: bold; line-height: 1.1; }

        /* --- LOWER THIRD --- */
        .player-box {
            position: absolute; bottom: 80px; left: 60px;
            display: flex; align-items: center; background: rgba(0,0,0,0.92);
            padding: 15px 40px 15px 150px; width: 620px; height: 110px;
            border-radius: 0 20px 20px 0; border-left: 12px solid #6fffe9;
        }
        .img-wrap { position: absolute; left: -20px; top: -35px; width: 150px; height: 175px; border: 5px solid #6fffe9; border-radius: 15px; overflow: hidden; background: #111; }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .p-name { color: #6fffe9; font-size: 45px; margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        @keyframes zoomIn { 0% { transform: scale(0.3); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div id="celebScreen">
        <h1 id="statusTitle" class="status-txt"></h1>
        <img id="celebImg" class="celeb-img" src="">
        <div id="celebDetail" class="celeb-info"></div>
    </div>

    <div class="player-box">
        <div class="img-wrap"><img id="mainImg" src=""></div>
        <div class="p-info">
            <h2 id="mainName" class="p-name">WAITING...</h2>
            <p id="mainType" style="color:white; margin:8px 0 0; font-size:24px; font-weight:bold; opacity:0.8;">GAUTAM DIGITAL LIVE</p>
        </div>
    </div>

<script>
    const apiURL = "https://script.google.com/macros/s/AKfycbx4OBlVp-XgSXJdt4S04PAJII4bJhxYnCU6_9O3QFdr75_0XnYmw4JG3XDQbE0S32jQ1w/exec";
    
    // ब्राउज़र की मेमोरी (Session) का इस्तेमाल करेंगे ताकि रिफ्रेश पर पुराना एनीमेशन न आए
    let lastPlayerKey = sessionStorage.getItem("lastKey") || ""; 
    let isAnimating = false;

    function getImg(link) {
        if (!link || link === "NONE" || link === "") return "https://via.placeholder.com/300?text=IMAGE";
        let id = link.includes("id=") ? link.split("id=")[1].split("&")[0] : link.split("/d/")[1]?.split("/")[0];
        return id ? "https://lh3.googleusercontent.com/d/" + id : link;
    }

    async function fetchData() {
        if (isAnimating) return;

        try {
            const res = await fetch(apiURL + "?action=players&t=" + Date.now());
            const data = await res.json();
            
            // 1. सबसे लेटेस्ट 'SOLD' या 'UNSOLD' प्लेयर ढूंढें (नीचे से ऊपर)
            let latestAction = null;
            for (let i = data.length - 1; i >= 0; i--) {
                let s = data[i].status ? data[i].status.toString().toUpperCase().trim() : "";
                if (s === "SOLD" || s === "UNSOLD") {
                    latestAction = data[i];
                    break;
                }
            }

            if (latestAction) {
                let statusClean = latestAction.status.toString().toUpperCase().trim();
                let currentKey = latestAction.name + "_" + statusClean + "_" + (latestAction.price || "0");

                // अगर यह प्लेयर पहले वाले से अलग है, तो एनीमेशन दिखाओ
                if (lastPlayerKey !== currentKey) {
                    lastPlayerKey = currentKey;
                    sessionStorage.setItem("lastKey", currentKey); // याद रखें
                    showCelebration(latestAction, statusClean);
                    return; 
                }
            }

            // 2. Current Bidding Player Update (अगर एनीमेशन नहीं चल रहा)
            const active = data.find(p => !p.status || p.status.toString().toUpperCase().trim() === "AVAILABLE" || p.status.toString().toUpperCase().trim() === "BIDDING");
            if (active) {
                document.getElementById("mainName").innerText = active.name.toUpperCase();
                document.getElementById("mainImg").src = getImg(active.photo);
                document.getElementById("mainType").innerText = `${active.type} | ${active.address || 'HPL SEONI'}`;
            }

        } catch (e) { console.log("Sync Error"); }
    }

    function showCelebration(p, status) {
        isAnimating = true;
        const screen = document.getElementById("celebScreen");
        document.getElementById("celebImg").src = getImg(p.photo);
        document.getElementById("statusTitle").innerText = status;
        
        if (status === "SOLD") {
            document.getElementById("statusTitle").style.color = "#ff0054";
            document.getElementById("celebDetail").innerHTML = `
                <span style="font-size:90px;">${p.name}</span><br>
                <span style="color:#6fffe9; font-size:60px;">${p.team}</span><br>
                <span style="color:#ffcc00; font-size:75px;">₹${parseInt(p.price || 0).toLocaleString('en-IN')}</span>`;
            
            confetti({ particleCount: 700, spread: 160, origin: { y: 0.6 }, zIndex: 100000 });
        } else {
            document.getElementById("statusTitle").style.color = "#ffffff";
            document.getElementById("celebDetail").innerHTML = `
                <span style="font-size:90px;">${p.name}</span><br>
                <span style="color:#aaaaaa">UNSOLD</span>`;
        }

        screen.style.display = "flex";
        screen.style.animation = "zoomIn 0.5s forwards";

        // 8 सेकंड बाद स्क्रीन छुपाएं
        setTimeout(() => {
            screen.style.display = "none";
            isAnimating = false;
        }, 8000);
    }

    // हर 3 सेकंड में चेक करें
    setInterval(fetchData, 3000);
    fetchData();
</script>
</body>
</html>
