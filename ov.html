<!DOCTYPE html>

<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Live Overlay - Gautam Digital</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
margin:0;
padding:0;
overflow:hidden;
background:transparent;
width:1920px;
height:1080px;
font-family:'Segoe UI', sans-serif;
}

/* PLAYER BOX */
.overlay-container {
position:absolute;
bottom:100px;
left:80px;
display:flex;
align-items:center;
background:linear-gradient(90deg, rgba(0,0,0,0.95), rgba(35,35,35,0.9));
border-radius:15px;
padding:10px 40px 10px 160px;
width:700px;
height:120px;
}

.p-photo-wrapper {
position:absolute;
left:-20px;
top:-40px;
width:160px;
height:200px;
border-radius:20px;
overflow:hidden;
border:4px solid #6fffe9;
}

.p-photo {
width:100%;
height:100%;
object-fit:cover;
}

.p-info h2 {
margin:0;
color:#6fffe9;
font-size:40px;
}

.p-info p {
margin-top:10px;
color:white;
font-size:22px;
}

/* SOLD SCREEN */
#soldCelebration {
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,0.95);
z-index:9999;
}

.sold-text {
font-size:150px;
font-weight:900;
color:#ff0054;
}

.sold-photo {
width:350px;
height:350px;
border-radius:20px;
margin:20px;
border:6px solid #6fffe9;
}

.sold-msg {
font-size:50px;
color:white;
text-align:center;
}
</style>

</head>

<body>

<!-- SOLD SCREEN -->

<div id="soldCelebration">
<p class="sold-text">SOLD</p>
<img id="soldPhoto" class="sold-photo">
<div id="soldMsg" class="sold-msg"></div>
</div>

<!-- PLAYER BOX -->

<div class="overlay-container">
<div class="p-photo-wrapper">
<img id="overPhoto" class="p-photo" src="">
</div>
<div class="p-info">
<h2 id="overName">WAITING...</h2>
<p id="overType">SEARCHING PLAYER</p>
</div>
</div>

<script>

// 🔗 API
const mainAPI = "https://script.google.com/macros/s/AKfycbx4OBlVp-XgSXJdt4S04PAJII4bJhxYnCU6_9O3QFdr75_0XnYmw4JG3XDQbE0S32jQ1w/exec";

// 🔥 FIXED
let lastSoldPlayerName = "";

// photo handler
function getPhoto(link){
if(!link || link==="NONE") return "https://via.placeholder.com/300";
return link;
}

async function updateOverlay(){
try{

const t = new Date().getTime();

// fetch data
const res = await fetch(mainAPI+"?action=players&t="+t);
const data = await res.json();

// DEBUG
console.log("DATA:", data);

// SOLD PLAYER
const sold = data.filter(p=>p.status==="SOLD").reverse();

if(sold.length > 0){
const latest = sold[0];

// ✅ MAIN FIX
if(latest.name !== lastSoldPlayerName){

console.log("🔥 NEW SOLD:", latest.name);

// set data
document.getElementById("soldPhoto").src = getPhoto(latest.photo);

document.getElementById("soldMsg").innerHTML =
`${latest.name}<br>
<span style="color:#6fffe9">${latest.team}</span><br>
₹${parseInt(latest.price).toLocaleString('en-IN')}`;

// animation show
const box = document.getElementById("soldCelebration");

// FORCE RESET (IMPORTANT)
box.style.display="none";
void box.offsetWidth;

box.style.display="flex";

// confetti
confetti({
particleCount:300,
spread:120
});

// auto hide
setTimeout(()=>{
box.style.display="none";
},6000);

}

// update last
lastSoldPlayerName = latest.name;

}

// CURRENT PLAYER
const available = data.filter(p=>p.status==="AVAILABLE" || !p.status);

if(available.length > 0){
const p = available[0];

document.getElementById("overName").innerText = p.name.toUpperCase();
document.getElementById("overType").innerText = p.type;
document.getElementById("overPhoto").src = getPhoto(p.photo);
}

}catch(e){
console.log("ERROR:", e);
}
}

// 🚀 FAST REFRESH
setInterval(updateOverlay,1500);
updateOverlay();

</script>

</body>
</html>
